<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Performance Evaluation</title>

<!-- Import de Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg-main: #060814;
  --bg-card: rgba(15, 23, 42, 0.6);
  --border-color: rgba(34, 211, 238, 0.15);
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --accent-cyan: #22d3ee;
  --accent-purple: #a855f7;
}

body {
  margin: 0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: radial-gradient(circle at top, #0f172a, var(--bg-main));
  color: var(--text-main);
  min-height: 100vh;
  padding: 40px 20px;
  box-sizing: border-box;
}

.container {
  max-width: 1200px;
  margin: auto;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 40px;
}

.header h1 {
  font-size: 2.2rem;
  font-weight: 700;
  margin: 0 0 10px 0;
  background: linear-gradient(135deg, #fff 0%, var(--accent-cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header p {
  color: var(--text-muted);
  margin: 0;
}

/* SECTION TITLE */
.section-title {
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--text-main);
  margin-bottom: 20px;
  border-left: 3px solid var(--accent-cyan);
  padding-left: 10px;
}

/* METRICS GRID */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  padding: 24px;
  border-radius: 16px;
  text-align: center;
  backdrop-filter: blur(8px);
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(34, 211, 238, 0.1);
  border-color: rgba(34, 211, 238, 0.4);
}

.card h3 {
  margin: 0 0 12px 0;
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
}

.card h2 {
  margin: 0;
  font-size: 2.2rem;
  font-weight: 700;
  color: #fff;
}

/* DOUBLE COLUMN LAYOUT FOR VISUALS */
.visuals-layout {
  display: grid;
  grid-template-columns: 1fr 1.21fr;
  gap: 30px;
}

@media (max-width: 968px) {
  .visuals-layout { grid-template-columns: 1fr; }
}

/* CONFUSION MATRIX (True 2x2 Grid) */
.matrix-container {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 25px;
}

.confusion-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 15px;
}

.matrix-cell {
  padding: 25px 15px;
  border-radius: 12px;
  text-align: center;
}

/* Couleurs spécifiques pour la matrice */
.cell-tn { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.05); }
.cell-tp { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); }
.cell-fp { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); }
.cell-fn { background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.2); }

.matrix-cell label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 5px;
}

.matrix-cell span {
  font-size: 1.8rem;
  font-weight: 700;
  color: #fff;
}

/* ROC CHART BOX */
.chart-box {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 25px;
  display: flex;
  flex-direction: column;
}

.chart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.auc-badge {
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
  color: #000;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.9rem;
}

canvas {
  width: 100% !important;
  max-height: 320px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>📊 ML Flight Evaluation Dashboard</h1>
    <p>Analyse avancée des performances du modèle Random Forest Classifier</p>
  </div>

  <!-- METRICS SECTION -->
  <div class="section-title">Métriques Clés</div>
  <div class="metrics-grid" id="metrics">
    <!-- Injecté par JS -->
  </div>

  <div class="visuals-layout">
    
    <!-- CONFUSION MATRIX SECTION -->
    <div class="matrix-container">
      <div class="section-title" style="border:none; padding:0; margin:0;">Matrice de Confusion</div>
      <p style="color: var(--text-muted); font-size: 0.85rem; margin: 5px 0 20px 0;">Répartition des prédictions réelles vs théoriques.</p>
      
      <div class="confusion-grid" id="confusion">
        <!-- Injecté par JS sous forme de vrai tableau 2x2 -->
      </div>
    </div>

    <!-- ROC CURVE SECTION -->
    <div class="chart-box">
      <div class="chart-header">
        <div class="section-title" style="border:none; padding:0; margin:0;">Courbe ROC</div>
        <div class="auc-badge">AUC: <span id="auc">0.0000</span></div>
      </div>
      <canvas id="rocChart"></canvas>
    </div>

  </div>

</div>

<script>
const API = "http://127.0.0.1:5000";

/* ───────── 1. METRICS ───────── */
async function loadMetrics(){
  const res = await fetch(API + "/model/metrics");
  const d = await res.json();

  const data = [
    {n: "Accuracy", v: d.accuracy},
    {n: "Precision", v: d.precision},
    {n: "Recall", v: d.recall},
    {n: "F1 Score", v: d.f1_score}
  ];

  document.getElementById("metrics").innerHTML = data.map(x => `
    <div class="card">
      <h3>${x.n}</h3>
      <h2>${x.v}%</h2>
    </div>
  `).join("");
}

/* ───────── 2. CONFUSION MATRIX (CORRIGÉ EN VRAI BLOC 2x2) ───────── */
async function loadConfusion(){
  const res = await fetch(API + "/model/confusion");
  const d = await res.json();

  // Organisation en structure carrée sémantique
  document.getElementById("confusion").innerHTML = `
    <div class="matrix-cell cell-tn">
      <label>Vrais Négatifs (TN)</label>
      <span>${d.tn}</span>
    </div>
    <div class="matrix-cell cell-fp">
      <label>Faux Positifs (FP)</label>
      <span>${d.fp}</span>
    </div>
    <div class="matrix-cell cell-fn">
      <label>Faux Négatifs (FN)</label>
      <span>${d.fn}</span>
    </div>
    <div class="matrix-cell cell-tp">
      <label>Vrais Positifs (TP)</label>
      <span>${d.tp}</span>
    </div>
  `;
}

/* ───────── 3. ROC CURVE (SUBLIMÉ) ───────── */
async function loadROC(){
  const res = await fetch(API + "/model/roc");
  const d = await res.json();

  document.getElementById("auc").innerText = d.auc;

  // On ajoute un point d'origine (0,0) et un point final (1,1) au cas où ils manquent pour stabiliser la ligne
  const points = d.points;

  new Chart(document.getElementById("rocChart"), {
    type: "scatter",
    data: {
      datasets: [
        {
          label: "Modèle (Random Forest)",
          data: points,
          showLine: true,
          borderColor: "#22d3ee",
          borderWidth: 3,
          pointRadius: 0,
          backgroundColor: "rgba(34, 211, 238, 0.03)",
          fill: true,
          tension: 0.1
        },
        {
          label: "Ligne Aléatoire (AUC = 0.5)",
          data: [{x: 0, y: 0}, {x: 1, y: 1}],
          showLine: true,
          borderColor: "rgba(255, 255, 255, 0.2)",
          borderWidth: 1,
          borderDash: [6, 6],
          pointRadius: 0,
          fill: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false } // Masqué pour un rendu plus propre
      },
      scales: {
        x: {
          type: 'linear',
          title: { display: true, text: 'Taux de Faux Positifs (FPR)', color: '#94a3b8' },
          min: 0, max: 1,
          grid: { color: "rgba(255, 255, 255, 0.05)" },
          ticks: { color: "#94a3b8" }
        },
        y: {
          title: { display: true, text: 'Taux de Vrais Positifs (TPR)', color: '#94a3b8' },
          min: 0, max: 1,
          grid: { color: "rgba(255, 255, 255, 0.05)" },
          ticks: { color: "#94a3b8" }
        }
      }
    }
  });
}

/* ───────── INIT ───────── */
async function init(){
  try {
    await loadMetrics();
    await loadConfusion();
    await loadROC();
  } catch(err) {
    console.error("Erreur de liaison API Backend :", err);
  }
}

init();
</script>

</body>
</html>
